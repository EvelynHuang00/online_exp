{% load otree static %}

{% block title %}{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'my_experiment/css/styles.css' %}?v=20260320c">
{% endblock %}

{% block content %}
<div class="container" id="taskApp" data-phase="{{ task_phase }}" data-practice-cycle="{{ practice_cycle }}">
  <div id="status"></div>

  <div id="mainHint" class="hidden" style="margin: 8px 0; color: #555;">
    Use ← / →.
  </div>

  <section id="fixation" class="hidden">
    <div class="fix-cross">+</div>
  </section>

  <section id="choice" class="hidden">
    <div class="row">
      <button type="button" id="leftBtn" class="choice-card">
        <img id="leftImg" alt="" />
        <div id="leftLabel"></div>
      </button>

      <button type="button" id="rightBtn" class="choice-card">
        <img id="rightImg" alt="" />
        <div id="rightLabel"></div>
      </button>
    </div>

    <div id="timer"></div>
  </section>

  <section id="faster" class="hidden" style="text-align:center; padding:80px 0;">
    <div style="font-size:56px; font-weight:700;">Faster!</div>
  </section>

  <input type="hidden" name="choice_data_json" id="choiceDataJson" value="">

  <div style="margin-top:12px;">
    <button class="otree-btn-next btn btn-primary" id="nextBtn" type="submit" disabled>
      Next
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  window.__TASK_PHASE__ = "{{ task_phase }}";
  window.__PRACTICE_CYCLE__ = {{ practice_cycle }};
  try {
    localStorage.setItem("phase", window.__TASK_PHASE__);
  } catch (e) {}
</script>
<script type="module" src="{% static 'my_experiment/js/task.js' %}?v=20260320c"></script>
{% endblock %}
