{% load otree static %}

{% block title %}{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'global/mgslider.css' %}">
{% endblock %}

{% block content %}
<div class="container">
  <div id="wtpHeader" style="display:none;">
    <h1>Willingness to Pay</h1>
    <p>Please enter your maximum willingness to pay for each snack below.</p>
  </div>

  <div id="bdmPractice"></div>

  <div id="wtpMain" style="display:none;">
    <div id="wtpForm">
      <div id="sliders_here"></div>
    </div>

    <div id="bdmResult" style="margin-top:16px;"></div>
    <input type="hidden" name="wtp_data_json" id="wtpDataJson" value="">

    <section id="end" style="margin-top:16px;">
      <p id="simulateHelp" style="margin-top:16px;">
        Click below to submit your answers.
      </p>

      <button type="button" id="simulateBtn" class="btn btn-primary">
        Submit Answers
      </button>
    </section>
  </div>

  <div style="margin-top:12px;">
    <button class="otree-btn-next btn btn-primary" id="nextBtn" type="submit" disabled>
      Next
    </button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'global/mgslider.js' %}"></script>
<script type="module" src="{% static 'my_experiment/js/wtp.js' %}"></script>
{% endblock %}
